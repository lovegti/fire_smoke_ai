<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>环境数据 - 智慧消防安全监测系统</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body {background:#f0f2f5}
        .navbar {background:#b71c1c;height:60px;display:flex;align-items:center;padding:0 40px}
        .navbar-logo {color:#fff;font-size:24px;font-weight:bold;margin-right:50px}
        .navbar-item {color:#fff;font-size:16px;margin:0 20px;text-decoration:none}
        .navbar-item:hover {color:#ffcdd2}
        .container {width:92%;margin:30px auto}
        .card {background:#fff;border-radius:8px;box-shadow:0 2px 10px #00000015;padding:20px;margin-bottom:20px}
        .card-title {font-size:18px;font-weight:bold;margin-bottom:15px;border-left:4px solid #b71c1c;padding-left:10px}
        .filter {display:flex;gap:15px;align-items:center;margin-bottom:15px}
        .filter input {padding:8px;border:1px solid #ddd;border-radius:4px}
        .btn {background:#b71c1c;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer}
        table {width:100%;border-collapse:collapse}
        th,td {border:1px solid #ddd;padding:10px;text-align:left}
        th {background:#f5f5f5}
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-logo">智慧消防安全监测系统</div>
        <a class="navbar-item" href="/">实时监控</a>
        <a class="navbar-item" href="/data">环境数据</a>
        <a class="navbar-item" href="/alarm">报警记录</a>
        <a class="navbar-item" href="/analysis">数据分析</a>
        <a class="navbar-item" href="/manage">系统管理</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">环境数据查询</div>
            <div class="filter">
                <span>开始时间：</span>
                <input type="datetime-local" id="startTime">
                <span>结束时间：</span>
                <input type="datetime-local" id="endTime">
                <button class="btn" onclick="queryData()">查询</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>温度(℃)</th>
                        <th>烟雾浓度</th>
                        <th>CO(ppm)</th>
                        <th>火灾风险(%)</th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        function queryData(){
            let start = document.getElementById("startTime").value.replace("T"," ");
            let end = document.getElementById("endTime").value.replace("T"," ");
            fetch(`/api/sensor_data?start=${start}&end=${end}`)
            .then(res=>res.json())
            .then(data=>{
                let html = "";
                data.forEach(item=>{
                    html += `<tr>
                        <td>${item[0]}</td>
                        <td>${item[1]}</td>
                        <td>${item[2]}</td>
                        <td>${item[3]}</td>
                        <td>${item[4]}</td>
                    </tr>`
                })
                document.getElementById("dataTable").innerHTML = html;
            })
        }
        // 初始加载
        queryData();
    </script>
</body>
</html>
